<!-- register.component.html -->
<div class="register-container">
  <h2>User Registration</h2>
  <form (ngSubmit)="onRegister()" #registerForm="ngForm">
    
    <div class="form-group">
      <label for="username">Username</label>
      <input [(ngModel)]="user.username" name="username" id="username" class="form-control" required>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input [(ngModel)]="user.password" name="password" id="password" class="form-control" type="password" required>
    </div>

    <div class="form-group">
      <label for="role">Role</label>
      <select [(ngModel)]="user.role" name="role" id="role" class="form-control" required>
        <option value="" disabled selected>Select a role</option>
        <option *ngFor="let role of roles" [value]="role">{{ role }}</option>
      </select>
    </div>

    <div class="text-center mt-3">
      <button type="submit" class="btn btn-primary btn-block">Register</button>
    </div>

    <!-- Success and error messages -->
    <div *ngIf="successMessage" class="alert alert-success mt-3">{{ successMessage }}</div>
    <div *ngIf="errorMessage" class="alert alert-danger mt-3">{{ errorMessage }}</div>
  </form>
</div>
