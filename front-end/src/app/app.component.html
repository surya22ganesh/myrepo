    <!-- Topbar -->
    <nav class="topbar d-flex justify-content-between align-items-center px-3">
      <!-- Left side (App Title) -->
      <div class="app-title ">
        <img src="assets/Vodafone3.png" alt="Vodafone" class="vodafone-logo" /> ReleaseX
      </div>


      <!-- Right side (Vodafone logo + Profile dropdown) -->
      <div class="d-flex align-items-center gap-3">
        <!-- <img src="assets/vodafone-logo.png" alt="Vodafone" class="vodafone-logo" /> -->
        <!-- <div>
          <i (click)="showAIresponse('topright')" class="pi pi-bell"
            style="font-size: 1.7rem; margin-top: 5px;margin-right: 10px;"></i>
        </div> -->
        <div class="dropdown">
          <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="userDropdown" role="button"
            data-bs-toggle="dropdown" aria-expanded="false">
            <img src="assets/user-icon.jpg" class="rounded-circle" alt="Profile" width="32" height="32" />
          </a>

          <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
            <li class="dropdown-item-text text-muted">
              👤 Logged in as: <b>{{ username }}</b>
            </li>
            <li class="dropdown-item-text text-muted">
              🔐 Role: <b>{{ roles.join(', ') }}</b>
            </li>
            <li>
              <hr class="dropdown-divider" />
            </li>
            <li>
              <a class="dropdown-item text-danger" href="#" (click)="logout()">Logout</a>
            </li>
          </ul>

        </div>

      </div>
    </nav>

    <!-- Layout after topbar -->
    <div class="body-layout">
      <!-- Sidebar -->
      <aside class="sidebar">
        <ul class="sidebar-nav list-unstyled font-light">

          <li *ngIf="roles.includes('Deployment Manager')">
            <a routerLink="/dashboard" routerLinkActive="active" class="nav-link">
              <i class="pi pi-th-large"></i>
              <span>Dashboard</span>
            </a>
          </li>

          <ng-container *ngIf="!roles.includes('Deployment Manager')">
            <li>
              <a routerLink="/tasklist" routerLinkActive="active" class="nav-link">
                <i class="pi pi-plus"></i>
                <span>My TaskList</span>
              </a>
            </li>

            <!-- <li>
              <a routerLink="/task-details" routerLinkActive="active" class="nav-link">
                <i class="pi pi-plus"></i>
                <span>My TaskList Details</span>
              </a>
            </li> -->
          </ng-container>

          <li *ngIf="roles.includes('Deployment Manager')">
            <a routerLink="/start-crq" routerLinkActive="active" class="nav-link">
              <i class="pi pi-plus"></i>
              <span>Manage CRQ</span>
            </a>

            <a routerLink="/sm-tasklist" routerLinkActive="active" class="nav-link">
              <i class="pi pi-list"></i>
              <span>My TaskList</span>
            </a>

            <!-- Parent Menu -->
            <a href="javascript:void(0)" class="nav-link" (click)="toggleRecords()">
              <i class="pi pi-calendar"></i>
              <span>Records</span>
              <i class="pi" [ngClass]="showRecords ? 'pi-chevron-down' : 'pi-chevron-right'"
                style="margin-left:auto;"></i>
            </a>

            <!-- Child Menu -->
            <ul *ngIf="showRecords" class="submenu list-unstyled ms-3">
              <li>
                <a routerLink="/crq-history" routerLinkActive="active" class="nav-link">
                  <i class="pi pi-file"></i>
                  <span>CRQ Records</span>
                </a>
              </li>
            </ul>

          </li>

          <li *ngIf="roles.includes('Admin')">
            <a routerLink="/home/add-employee" routerLinkActive="active" class="nav-link">
              <i class="pi pi-plus-circle"></i>
              <span>Create CRQ Ticket</span>
            </a>
          </li>

        </ul>
      </aside>


      <!-- Main Content -->
      <div class="main-content">
        <main>
          <router-outlet></router-outlet>
        </main>

        <footer class="footer">
          <span>© {{ currentYear }} Powered by VodafoneThree</span>
        </footer>
      </div>
    </div>
  </div>
</ng-container>
<ng-template #loginPage>
  <router-outlet></router-outlet>
</ng-template>
