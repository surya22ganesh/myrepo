@if(showRetroTable){

<div class="card">
  <p-table [value]="retroTableData" [columns]="retroTableColumns" class="font-light" [paginator]="true" [rows]="5"
    [rowsPerPageOptions]="[5, 10, 20]" [tableStyle]="{ 'min-width': '55rem' }">

    <!-- HEADER -->
    <ng-template pTemplate="header" let-columns>
      <tr>
        <th *ngFor="let col of columns">
          {{ col.header }}
        </th>
      </tr>
    </ng-template>

    <!-- BODY -->
    <ng-template pTemplate="body" let-row let-columns="columns" let-rowIndex="rowIndex">
      <tr>
        <td *ngFor="let col of columns">

          <!-- ✅ Sr No -->
          <ng-container *ngIf="col.field === 'srNo'">
            {{ rowIndex + 1 }}
          </ng-container>

          <ng-container *ngIf="col.field === 'rag'">
            <span class="rag-box" [ngClass]="{
      'red': row.rag?.toUpperCase().trim() === 'RED',
      'amber': row.rag?.toUpperCase().trim() === 'AMBER',
      'green': row.rag?.toUpperCase().trim() === 'GREEN'
    }" title="{{ row.rag }}">
            </span>
          </ng-container>

          <!-- ✅ Normal fields -->
          <ng-container *ngIf="col.field !== 'srNo' && col.field !== 'rag'">
            {{ row[col.field] }}
          </ng-container>

        </td>
      </tr>
    </ng-template>

    <!-- ✅ EMPTY MESSAGE -->
    <ng-template pTemplate="emptymessage">
      <tr>
        <td [attr.colspan]="retroTableColumns.length" class="text-center empty-message">
          No Retrospective data captured
        </td>
      </tr>
    </ng-template>

  </p-table>
</div>

}
@else {
<div class="grid">
  <div class="col">
    <div class="text-center p-3 font-light">
      Loading...
    </div>
  </div>
</div>
}
